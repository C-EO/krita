<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="250" height="255" version="2.0"><defs><path id="bubble" d="M60 0C90 0 120 30 120 60C120 90 90 120 60 120C30 120 0 90 0 60C0 30 30 0 60 0Z"/><path id="bubble2" d="M60 0C90 0 120 30 120 60C120 90 90 120 60 120C30 120 0 90 0 60C0 30 30 0 60 0Z" transform="translate(60, 0)"/><path id="bubble3" d="M60 0C90 0 120 30 120 60C120 90 90 120 60 120C30 120 0 90 0 60C0 30 30 0 60 0Z" transform="translate(120, 0)"/><path id="curly" fill-rule="nonzero" d="M60 60C30 30 60 0 90 0C115 0 120 30 120 60C120 90 90 120 60 120C30 120 0 90 0 60C0 30 5 0 30 0C60 0 90 30 60 60Z" transform="translate(0, 0)"/><path id="coin" fill-rule="nonzero" d="M60 0C90 0 120 30 120 60C120 90 90 120 60 120C30 120 0 90 0 60C0 30 30 0 60 0ZM50 70L70 70L70 50L50 50Z" transform="translate(90, 0)"/></defs><g id="testRect"><use fill="#b0e0e6" stroke="sienna" transform="translate(5,5)" xlink:href="#bubble"/><use fill="#b0e0e6" stroke="sienna" transform="translate(5,5)" xlink:href="#bubble3"/><use fill="beige" stroke="#2e8b57" transform="translate(5,5)" xlink:href="#bubble2"/><text id="test1" fill="sienna" font-family="DejaVu Sans" font-size="10" transform="translate(5,5)" style="shape-inside:url(#bubble) url(#bubble3);shape-subtract:url(#bubble2);shape-margin:12;shape-padding:6;text-align:center">The quick brown fox jumps over the lazy dog, sphinx of black quartz judge my vow.</text><text id="test2" fill="#2e8b57" font-family="DejaVu Sans" font-size="10" transform="translate(5,5)" style="shape-inside:url(#bubble2);shape-margin:12;shape-padding:6;text-align:center">Pa&apos;s wijze lynx overzag vroom het fikse aquaduct.</text><use fill="beige" stroke="none" transform="translate(20,130)" xlink:href="#curly"/><use fill="#b0e0e6" stroke="sienna" transform="translate(20,130)" xlink:href="#coin"/><use fill="none" stroke="#2e8b57" transform="translate(20,130)" xlink:href="#curly"/><text id="test1" fill="#2e8b57" font-family="DejaVu Sans" font-size="10" transform="translate(20,130)" style="shape-inside:url(#curly);shape-subtract:url(#coin);shape-margin:6;shape-padding:3;text-align:center">The quick brown fox jumps over the lazy dog.</text><text id="test1" fill="sienna" font-family="DejaVu Sans" font-size="10" transform="translate(20,130)" style="shape-inside:url(#coin);shape-subtract:url(#curly);shape-margin:6;shape-padding:3;text-align:center">A Sphinx of black quartz judges vows.</text></g></svg>