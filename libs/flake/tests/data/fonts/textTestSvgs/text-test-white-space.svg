<svg xmlns="http://www.w3.org/2000/svg" width="400" height="320" version="2.0"><g id="testRect"><text id="test-ws-normal" fill="red" font-family="DejaVu Sans" font-size="10" transform="translate(5,15)" style="white-space:normal;tab-size:4;inline-size:100">This tests &quot;white-space:normal&quot;, which collapses spaces and wraps text. <tspan direction="rtl" unicode-bidi="embed">داستان SVG 2.0 SE طولا ني است.</tspan></text><text id="test-ws-pre" fill="#00f" font-family="DejaVu Sans" font-size="10" transform="translate(115,15)" style="white-space:pre;tab-size:4;inline-size:100">This tests &quot;white-space:pre&quot;, which preserves spaces and does not wrap text. <tspan direction="rtl" unicode-bidi="embed">داستان SVG 2.0 SE طولا ني است.</tspan></text><text id="test-ws-nowrap" fill="#00f" font-family="DejaVu Sans" font-size="10" transform="translate(105,115)" style="white-space:nowrap;tab-size:4;inline-size:100">This tests &quot;white-space:nowrap&quot;, which collapses spaces and does not wrap text. <tspan direction="rtl" unicode-bidi="embed">داستان SVG 2.0 SE طولا ني است.</tspan></text><text style="white-space:normal" fill="green" dy="0 -3 -3 -3 -3 3 3 3 3 0 -3 -3 -3 -3 3 3 3 3 0" font-family="DejaVu Sans" font-size="10" transform="translate(120,180)">Test text with white-space.</text><text style="white-space:pre" fill="green" dy="0 -3 -3 -3 -3 3 3 3 3 0 -3 -3 -3 -3 -3 3 3 3 3 3 0 -3 -3 -3 -3 3 3 3 3 0 -3 -3 -3 -3 3 3 3 3 0" font-family="DejaVu Sans" font-size="10" transform="translate(280,170)">Test hard breaks for svg 1.1 style text.</text><text id="test-ws-pre-wrap" fill="red" font-family="DejaVu Sans" font-size="10" transform="translate(5,115)" style="white-space:pre-wrap;tab-size:4;inline-size:100">This tests &quot;white-space:pre-wrap&quot;, which preserves spaces and wraps text. <tspan direction="rtl" unicode-bidi="embed">داستان SVG 2.0 SE طولا ني است.</tspan></text><text id="test-ws-pre-line" fill="red" font-family="DejaVu Sans" font-size="10" transform="translate(5,215)" style="white-space:pre-line;tab-size:4;inline-size:100">This tests &quot;white-space:pre-line&quot;, which preserves breaks and wraps text. <tspan direction="rtl" unicode-bidi="embed">داستان SVG 2.0 SE طولا ني است.</tspan></text><text id="test-xmlspace-default" fill="#00f" font-family="DejaVu Sans" font-size="10" transform="translate(105,215)" xml:space="default" style="inline-size:100;tab-size:4">This tests xml:space=&quot;default&quot;, which removes spaces and may wrap text. <tspan direction="rtl" unicode-bidi="embed">داستان SVG 2.0 SE طولا ني است.</tspan></text><text id="test-xmlspace-preserve" fill="green" font-family="DejaVu Sans" font-size="10" transform="translate(215,215)" xml:space="preserve" style="inline-size:100;tab-size:4">This tests xml:space=&quot;preserve&quot;, which preserves spaces and may wrap text. <tspan direction="rtl" unicode-bidi="embed">داستان SVG 2.0 SE طولا ني است.</tspan></text></g></svg>