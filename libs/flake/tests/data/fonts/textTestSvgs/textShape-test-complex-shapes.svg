<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="380" height="380" version="2.0"><defs><rect id="rotatedRect" width="84" height="84" x="0" y="0" transform="rotate(45)"/><rect id="tinyRect" width="5" height="5" x="60" y="60"/><polygon id="hourglass" points="0 0 120 0 0 120 120 120"/><polygon id="overlapNonZero" fill-rule="nonzero" points="0 0 20 0 70 70 50 70 50 0 120 0 120 120 0 120"/><polygon id="overlapEvenOdd" fill-rule="evenodd" points="0 0 20 0 70 70 50 70 50 0 120 0 120 120 0 120"/><path id="ring" fill-rule="nonzero" d="M0 0L120 0L120 120L0 120ZM50 70L70 70L70 50L50 50Z"/><polygon id="pronged" fill-rule="evenodd" points="0 0 50 0 50 70 70 70 70 0 120 0 120 120 0 120"/><path id="notclosed" d="M50 50L50 70L120 70L120 120L0 120L0 0L120 0L120 50"/><path id="split" d="M0 0L50 0L50 120L0 120Z M70 0L120 0L120 120L70 120Z"/><path id="left" d="M0 0L50 0L50 120L0 120Z"/><path id="right" d="M70 0L120 0L120 120L70 120Z"/></defs><g id="testRect"><use id="ref-rotatedRect" fill="#6495ed" fill-opacity=".2" stroke="#6495ed" transform="translate(65,5)" xlink:href="#rotatedRect"/><text id="test-rotatedRect" fill="#00f" font-family="DejaVu Sans" font-size="10" transform="translate(65,5)" style="shape-inside:url(#rotatedRect)">Text inside a rotated rect. The quick brown fox jumps over the lazy dog.</text><use id="ref-tinyRect" fill="#6495ed" fill-opacity=".2" stroke="#6495ed" transform="translate(130,5)" xlink:href="#tinyRect"/><text id="test-tinyRect" fill="#00f" font-family="DejaVu Sans" font-size="10" transform="translate(130,5)" style="shape-inside:url(#tinyRect)">Too tiny!</text><use id="ref-hourglass" fill="#6495ed" fill-opacity=".2" stroke="#6495ed" transform="translate(255,5)" xlink:href="#hourglass"/><text id="test-hourglass" fill="#00f" font-family="DejaVu Sans" font-size="10" transform="translate(255,5)" style="shape-inside:url(#hourglass)">Text inside a polygon with crossing edges. The quick brown fox jumps over the lazy dog.</text><use id="ref-overlapNonZero" fill="#6495ed" fill-opacity=".2" stroke="#6495ed" transform="translate(5,130)" xlink:href="#overlapNonZero"/><text id="test-overlapNonZero" fill="#00f" font-family="DejaVu Sans" font-size="10" transform="translate(5,130)" style="shape-inside:url(#overlapNonZero)">Text inside a self-overlapping polygon with fill-rule: nonzero. The quick brown fox jumps over the lazy dog. <tspan direction="rtl" unicode-bidi="embed">داستان SVG 2.0 SE طولا ني است.</tspan></text><use id="ref-overlapEvenOdd" fill="#6495ed" fill-opacity=".2" stroke="#6495ed" transform="translate(130,130)" xlink:href="#ring"/><text id="test-overlapEvenOdd" fill="#00f" font-family="DejaVu Sans" font-size="10" transform="translate(130,130)" style="shape-inside:url(#ring)">Text inside a self-overlapping polygon with fill-rule: evenodd. The quick brown fox jumps over the lazy dog. <tspan direction="rtl" unicode-bidi="embed">داستان SVG 2.0 SE طولا ني است.</tspan></text><use id="ref-pronged" fill="#6495ed" fill-opacity=".2" stroke="#6495ed" transform="translate(255,130)" xlink:href="#pronged"/><text id="test-pronged" fill="#00f" font-family="DejaVu Sans" font-size="10" transform="translate(255,130)" style="shape-inside:url(#pronged)">Text inside a pronged polygon. The quick brown fox jumps over the lazy dog. <tspan direction="rtl" unicode-bidi="embed">داستان SVG 2.0 SE طولا ني است.</tspan></text><use id="ref-notclosed" fill="#6495ed" fill-opacity=".2" stroke="#6495ed" transform="translate(5,255)" xlink:href="#notclosed"/><text id="test-notclosed" fill="#00f" font-family="Krita_Test_Unicode_Variation_A" font-size="10" transform="translate(5,255)" writing-mode="vertical-rl" style="shape-inside:url(#notclosed)">あああああ芦芦芦芦芦芦ああああああ</text><use id="ref-split" fill="#6495ed" fill-opacity=".2" stroke="#6495ed" transform="translate(130,255)" xlink:href="#split"/><text id="test-split" fill="#00f" font-family="DejaVu Sans" font-size="10" transform="translate(130,255)" style="shape-inside:url(#split)">Text inside a totally split rect. The quick brown fox jumps over the lazy dog. <tspan direction="rtl" unicode-bidi="embed">داستان SVG 2.0 SE طولا ني است.</tspan></text><use id="ref-left" fill="#6495ed" fill-opacity=".2" stroke="#6495ed" transform="translate(255,255)" xlink:href="#left"/><use id="ref-right" fill="#6495ed" fill-opacity=".2" stroke="#6495ed" transform="translate(255,255)" xlink:href="#right"/><text id="test-double" fill="#00f" font-family="DejaVu Sans" font-size="10" transform="translate(255,255)" style="shape-inside:url(#left) url(#right)">Text inside two separate rects. The quick brown fox jumps over the lazy dog. <tspan direction="rtl" unicode-bidi="embed">داستان SVG 2.0 SE طولا ني است.</tspan></text></g></svg>